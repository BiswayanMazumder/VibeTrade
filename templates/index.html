<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantedge | AI Pro Terminal</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 150vh; padding-top: 130px; overflow-x: hidden; }
        header { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(25px); padding: 1.5rem 3rem; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .header-hidden { transform: translateY(-100%); }
        .glass-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .stat-bar { width: 100%; border-radius: 6px 6px 0 0; transition: height 1.5s ease-out; min-height: 4px; }
        .fill-health { background: linear-gradient(to top, #1e3a8a, #3b82f6); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .fill-hype { background: linear-gradient(to top, #7c2d12, #f97316); box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        #suggestions { position: fixed; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; display: none; z-index: 100000; box-shadow: 0 40px 80px rgba(0,0,0,1); }
    </style>
</head>
<body>
        <div id="authModal" class="fixed inset-0 z-[200000] bg-black/80 backdrop-blur-xl flex items-center justify-center hidden">
        <div class="glass-card p-8 rounded-2xl w-[350px]">
            <h2 id="authTitle" class="text-lg font-bold mb-4 text-center uppercase">Login</h2>
            <input id="authEmail" placeholder="Email" class="w-full mb-3 p-3 bg-white/5 rounded-xl outline-none focus:ring-1 ring-emerald-500">
            <input id="authPassword" type="password" placeholder="Password" class="w-full mb-3 p-3 bg-white/5 rounded-xl outline-none focus:ring-1 ring-emerald-500">
            <input id="authUsername" placeholder="Username" class="w-full mb-3 p-3 bg-white/5 rounded-xl hidden outline-none focus:ring-1 ring-emerald-500">
            <p id="authError" class="text-red-400 text-xs mb-3 hidden text-center"></p>
            <button onclick="submitAuth()" class="w-full py-3 bg-emerald-500 text-black font-bold rounded-xl hover:scale-[1.02] transition-all">Continue</button>
            <p onclick="toggleAuthMode()" class="text-[10px] text-gray-400 mt-4 text-center cursor-pointer uppercase hover:text-white">Switch Mode</p>
        </div>
    </div>
    <div id="loader" class="fixed inset-0 z-[100000] flex flex-col items-center justify-center bg-[#050505]/95 backdrop-blur-2xl hidden">
        <div class="w-16 h-16 border-4 border-emerald-500/10 border-t-emerald-400 rounded-full animate-spin"></div>
    </div>

    <header id="mainHeader" class="flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase">VANT<span class="text-emerald-400">EDGE.</span></h1>
        <div class="flex items-center gap-6" id="searchContainer">
            <input id="tickerInput" oninput="handleSearch(this.value)" onfocus="handleSearch('')" placeholder="Search Asset..." class="w-80 bg-white/5 border border-white/10 rounded-2xl px-6 py-3 outline-none focus:border-emerald-500 font-bold uppercase text-xs">
            <div id="suggestions"></div>
            <button onclick="openAuth()" id="loginBtn" class="text-[10px] font-bold bg-white/5 border border-white/10 px-6 py-3 rounded-xl">Login</button>
            <button onclick="logout()" id="logoutBtn" class="text-[10px] font-bold bg-red-500/10 text-red-400 px-6 py-3 rounded-xl hidden">Sign Out</button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 glass-card rounded-[3rem] p-10">
                <p id="symbolDisplay" class="text-gray-500 font-bold text-[10px] uppercase">---</p>
                <h2 id="priceDisplay" class="text-6xl font-extrabold italic tracking-tighter">0.00</h2>
                <span id="changeDisplay" class="text-xl font-bold">0.00%</span>

                <div class="flex gap-8 my-8 border-b border-white/5 pb-2 text-[11px] font-bold text-gray-500">
                    <button onclick="updateData('1d', this)" class="time-btn active-btn">1D</button>
                    <button onclick="updateData('1mo', this)" class="time-btn">1M</button>
                    <button onclick="updateData('1y', this)" class="time-btn">1Y</button>
                </div>

                <div id="chartContainer" style="height:400px;"></div>

                <div class="grid grid-cols-3 gap-8 mt-10 pt-10 border-t border-white/5">
                    <div class="space-y-4 text-[11px] uppercase">
                        <div class="flex justify-between"><span class="text-gray-500">Open</span><span id="f_open">---</span></div>
                        <div class="flex justify-between"><span class="text-gray-500">Mkt Cap</span><span id="f_mkt">---</span></div>
                    </div>
                    <div class="space-y-4 text-[11px] uppercase">
                        <div class="flex justify-between"><span class="text-gray-500">P/E Ratio</span><span id="f_pe">---</span></div>
                        <div class="flex justify-between"><span class="text-gray-500">52W High</span><span id="f_h52">---</span></div>
                    </div>
                    <div class="space-y-4 text-[11px] uppercase">
                        <div class="flex justify-between"><span class="text-gray-500">Dividend</span><span id="f_div">---</span></div>
                        <div class="flex justify-between"><span class="text-gray-500">52W Low</span><span id="f_l52">---</span></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="glass-card rounded-[2.5rem] p-8 border-l-4 border-blue-500">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">12M AI Target</p>
                    <h3 id="targetDisplay" class="text-4xl font-black">---</h3>
                </div>
                <div class="glass-card rounded-[2.5rem] p-8">
                    <p class="text-[10px] font-bold text-orange-400 mb-6 uppercase">⚡ Hype vs Health</p>
                    <div class="flex gap-10 h-28 items-end">
                        <div class="flex-1 flex flex-col items-center"><div id="healthBar" class="stat-bar fill-health" style="height:0%"></div><p class="text-[8px] font-bold mt-2">HEALTH</p></div>
                        <div class="flex-1 flex flex-col items-center"><div id="hypeBar" class="stat-bar fill-hype" style="height:0%"></div><p class="text-[8px] font-bold mt-2">HYPE</p></div>
                    </div>
                </div>
                <div class="glass-card rounded-[2.5rem] p-8">
                    <p class="text-[10px] font-bold text-gray-500 mb-6 uppercase">Headline Stream</p>
                    <div id="newsArea" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ticker = "AAPL", period = "1d", lastScroll = 0, isLogin = true;
                function openAuth() { document.getElementById("authModal").classList.remove("hidden"); }
        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById("authTitle").innerText = isLogin ? "LOGIN" : "REGISTER";
            document.getElementById("authUsername").classList.toggle("hidden", isLogin);
        }

        async function submitAuth() {
            const email = document.getElementById("authEmail").value;
            const password = document.getElementById("authPassword").value;
            const username = document.getElementById("authUsername").value;
            const error = document.getElementById("authError");
            let url = isLogin ? `/auth/login?email=${email}&password=${password}` : `/auth/register?username=${username}&email=${email}&password=${password}`;
            
            try {
                const res = await fetch(url, { method: "POST" });
                const data = await res.json();
                if (!res.ok) { error.innerText = data.detail; error.classList.remove("hidden"); return; }
                if (isLogin) { localStorage.setItem("token", data.access_token); location.reload(); }
                else { error.innerText = "Success! Now Login."; error.classList.add("success-text"); toggleAuthMode(); }
            } catch { error.innerText = "Network Error"; }
        }

        function logout() { localStorage.removeItem("token"); location.reload(); }
        function updateAuthUI() {
            const token = localStorage.getItem("token");
            document.getElementById("loginBtn").classList.toggle("hidden", !!token);
            document.getElementById("logoutBtn").classList.toggle("hidden", !token);
        }
        async function refreshData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`/api/stream/${ticker}?period=${period}`);
                const data = await res.json();
                
                document.getElementById('symbolDisplay').innerText = data.symbol;
                document.getElementById('priceDisplay').innerHTML = `${data.price} <span class="text-sm text-gray-500 ml-2 font-normal">${data.currency_text}</span>`;
                document.getElementById('changeDisplay').innerText = data.change;
                document.getElementById('changeDisplay').style.color = parseFloat(data.change) >= 0 ? '#00ffbb' : '#ff3366';
                document.getElementById('targetDisplay').innerText = data.target;

                setTimeout(() => {
                    document.getElementById('healthBar').style.height = `70%`;
                    document.getElementById('hypeBar').style.height = `60%`;
                }, 100);

                const c = data.chart_json;
                const statusColor = c.is_live ? '#00ffbb' : '#ff3366';

                Plotly.newPlot('chartContainer', [{
                    x: c.x, y: c.y, type: 'scatter', mode: 'lines',
                    line: { color: statusColor, width: 2.5, shape: 'hv' },
                    hovertemplate: `<b>%{y:,.2f}</b><br>%{x}<extra></extra>`
                }], {
                    template: 'plotly_dark', paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { t: 40, b: 20, l: 0, r: 40 },
                    annotations: [{
                        xref: 'paper', yref: 'paper', x: 1, y: 1.1, text: c.status,
                        showarrow: false, font: { color: statusColor, size: 10, weight: 'bold' }
                    }],
                    xaxis: { showgrid: false },
                    yaxis: { side: 'right', showgrid: true, gridcolor: 'rgba(255,255,255,0.05)' }
                }, { responsive: true, displayModeBar: false });

                document.getElementById('newsArea').innerHTML = data.news.map(n => 
                    `<a href="${n.link}" target="_blank" class="block text-[11px] hover:text-emerald-400 italic underline decoration-white/5">${n.title}</a>`
                ).join('');

                const f = data.fundamentals;
                document.getElementById('f_open').innerText = f.open;
                document.getElementById('f_mkt').innerText = f.mkt_cap;
                document.getElementById('f_pe').innerText = f.pe_ratio;
                document.getElementById('f_h52').innerText = f.high_52w;
                document.getElementById('f_div').innerText = f.dividend;
                document.getElementById('f_l52').innerText = f.low_52w;

            } catch (e) { console.error(e); } finally { setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500); }
        }

        async function handleSearch(q) {
            const box = document.getElementById('suggestions');
            const rect = document.getElementById('tickerInput').getBoundingClientRect();
            box.style.top = `${rect.bottom + window.scrollY + 8}px`; 
            box.style.left = `${rect.left}px`; box.style.width = `${rect.width}px`;

            const endpoint = q === '' ? '/api/context' : `/api/search/${q}`;
            try {
                const res = await fetch(endpoint);
                const data = await res.json();
                const list = q === '' ? data.trending : data;
                
                if (list.length > 0) {
                    box.innerHTML = list.map(i => `<div onclick="selectTicker('${i.symbol}')" class="p-4 hover:bg-white/5 cursor-pointer text-xs flex justify-between"><span><b class="text-emerald-400">${i.symbol}</b> - ${i.name}</span></div>`).join('');
                    box.style.display = 'block';
                } else { box.style.display = 'none'; }
            } catch { box.style.display = 'none'; }
        }

        function selectTicker(s) { ticker = s; refreshData(); document.getElementById('suggestions').style.display='none'; }
        function updateData(p, btn) { period = p; document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active-btn')); btn.classList.add('active-btn'); refreshData(); }

         window.onload = () => { updateAuthUI(); refreshData(); };
        window.addEventListener("scroll", () => {
            let curr = window.pageYOffset;
            document.getElementById("mainHeader").classList.toggle("header-hidden", curr > lastScroll && curr > 60);
            lastScroll = curr;
        });
    </script>
</body>
</html>
