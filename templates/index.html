<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantedge | AI Pro Terminal</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 100vh; padding-top: 120px; }
        header { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(25px); padding: 1.5rem 3rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .glass-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .stat-bar { width: 100%; border-radius: 6px; transition: height 1.5s ease; min-height: 4px; }
        .fill-health { background: linear-gradient(to top, #1e3a8a, #3b82f6); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .fill-hype { background: linear-gradient(to top, #7c2d12, #f97316); box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
        #suggestions { position: fixed; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; display: none; z-index: 100000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .active-btn { color: #10b981 !important; border-bottom: 2px solid #10b981; }
    </style>
</head>
<body>
    <div id="loader" class="fixed inset-0 z-[100000] flex flex-col items-center justify-center bg-[#050505]/90 hidden animate-pulse">
        <div class="w-10 h-10 border-4 border-emerald-500/20 border-t-emerald-400 rounded-full animate-spin"></div>
    </div>

    <header class="flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">VANT<span class="text-emerald-400">EDGE.</span></h1>
        <div class="flex items-center gap-4">
            <div id="searchContainer" class="relative">
                <input id="tickerInput" oninput="handleSearch(this.value)" onfocus="handleSearch('')" autocomplete="off" placeholder="SEARCH ASSET..." class="w-64 bg-white/5 border border-white/10 rounded-2xl px-6 py-3 outline-none focus:border-emerald-500 font-bold text-[10px] uppercase">
                <div id="suggestions"></div>
            </div>
            <button onclick="toggleAuth()" id="userBtn" class="bg-white text-black px-6 py-3 rounded-2xl font-black text-[10px] uppercase hover:bg-emerald-400 transition-all">Access Terminal</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8 glass-card rounded-[3rem] p-10">
            <div class="mb-10">
                <p id="symbolDisplay" class="text-gray-500 font-bold text-[10px] uppercase">---</p>
                <h2 id="priceDisplay" class="text-6xl font-black italic tracking-tighter">0.00</h2>
                <span id="changeDisplay" class="text-xl font-bold">0.00%</span>
            </div>
            <div class="flex gap-6 mb-8 text-[11px] font-bold text-gray-500 border-b border-white/5 pb-2">
                <button onclick="updateData('1d', this)" class="time-btn active-btn">1D</button>
                <button onclick="updateData('1mo', this)" class="time-btn">1M</button>
                <button onclick="updateData('1y', this)" class="time-btn">1Y</button>
            </div>
            <div id="chartContainer" style="height:400px;"></div>
        </div>

        <div class="lg:col-span-4 flex flex-col gap-6">
            <div class="glass-card rounded-[2.5rem] p-8 border-l-4 border-emerald-400">
                <p class="text-[10px] font-bold text-emerald-400 uppercase mb-1">AI 12M Target</p>
                <h3 id="targetDisplay" class="text-4xl font-black tracking-tighter">---</h3>
            </div>
            <div class="glass-card rounded-[2.5rem] p-8 h-48 flex flex-col justify-between">
                <p class="text-[10px] font-bold uppercase text-blue-400">⚡ Market Sentiment</p>
                <div class="flex items-end gap-10 flex-1 px-4">
                    <div class="flex-1 flex flex-col items-center"><div id="healthBar" class="stat-bar fill-health" style="height: 0%"></div><p class="text-[8px] mt-2 font-black text-blue-400">HEALTH</p></div>
                    <div class="flex-1 flex flex-col items-center"><div id="hypeBar" class="stat-bar fill-hype" style="height: 0%"></div><p class="text-[8px] mt-2 font-black text-orange-400">HYPE</p></div>
                </div>
            </div>
            <div class="glass-card rounded-[2.5rem] p-8 flex-1">
                <p class="text-[10px] font-bold uppercase text-gray-500 mb-6">Neural Headlines</p>
                <div id="newsArea" class="space-y-5"></div>
            </div>
        </div>
    </main>

    <div id="authOverlay" class="fixed inset-0 z-[200000] bg-black/90 backdrop-blur-3xl hidden flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-md rounded-[3rem] p-10 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-500/20 blur-[60px]"></div>
            <button onclick="toggleAuth()" class="absolute top-8 right-8 text-gray-500 font-bold text-[10px]">CLOSE [ESC]</button>
            
            <div id="loginForm">
                <h2 class="text-4xl font-black italic tracking-tighter mb-8">USER <span class="text-emerald-400">SYNC.</span></h2>
                <input id="lEmail" type="email" placeholder="EMAIL" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-emerald-500 text-xs font-bold mb-4">
                <input id="lPass" type="password" placeholder="PASSWORD" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-emerald-500 text-xs font-bold mb-6">
                <button onclick="handleLogin()" class="w-full bg-emerald-400 text-black py-5 rounded-2xl font-black text-xs uppercase hover:shadow-[0_0_30px_rgba(16,185,129,0.3)] transition-all">Initialize Session</button>
                <p class="mt-8 text-center text-[9px] font-bold text-gray-500 uppercase">New Terminal? <button onclick="switchAuth()" class="text-emerald-400 underline">Generate ID</button></p>
            </div>

            <div id="registerForm" class="hidden">
                <h2 class="text-4xl font-black italic tracking-tighter mb-8">GENERATE <span class="text-emerald-400">ID.</span></h2>
                <input id="rName" type="text" placeholder="NAME" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-emerald-500 text-xs font-bold mb-4">
                <input id="rEmail" type="email" placeholder="EMAIL" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-emerald-500 text-xs font-bold mb-4">
                <input id="rPass" type="password" placeholder="PASSWORD" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-emerald-500 text-xs font-bold mb-6">
                <button onclick="handleRegister()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-xs uppercase hover:bg-emerald-400 transition-all">Link Neural ID</button>
                <p class="mt-8 text-center text-[9px] font-bold text-gray-500 uppercase">Already Linked? <button onclick="switchAuth()" class="text-emerald-400 underline">Sync Instead</button></p>
            </div>
        </div>
    </div>

    <script>
        let ticker = "AAPL", period = "1d";

        function toggleAuth() { document.getElementById('authOverlay').classList.toggle('hidden'); }
        function switchAuth() { document.getElementById('loginForm').classList.toggle('hidden'); document.getElementById('registerForm').classList.toggle('hidden'); }

        async function handleLogin() {
            const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: lEmail.value, password: lPass.value})});
            const data = await res.json();
            if(res.ok) { document.getElementById('userBtn').innerText = data.username.toUpperCase(); toggleAuth(); } else { alert(data.detail); }
        }

        async function handleRegister() {
            const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: rName.value, email: rEmail.value, password: rPass.value})});
            if(res.ok) { alert("ID Created. Syncing..."); switchAuth(); } else { const d = await res.json(); alert(d.detail); }
        }

        async function handleSearch(q) {
            const box = document.getElementById('suggestions');
            const rect = document.getElementById('tickerInput').getBoundingClientRect();
            box.style.top = `${rect.bottom + window.scrollY + 12}px`; box.style.left = `${rect.left}px`; box.style.width = `${rect.width}px`;
            if (q === '') {
                const res = await fetch('/api/context'); const data = await res.json();
                box.innerHTML = `<p class="p-4 text-[8px] font-black text-gray-600 border-b border-white/5">TRENDING</p>` + data.trending.map(i => `<div onclick="selectTicker('${i.s}')" class="p-4 hover:bg-white/5 cursor-pointer text-[10px] font-bold"><span>${i.s} <span class="text-gray-600 font-normal">| ${i.n}</span></span></div>`).join('');
                box.style.display = 'block'; return;
            }
            const res = await fetch(`/api/search/${q}`); const data = await res.json();
            box.innerHTML = data.map(i => `<div onclick="selectTicker('${i.symbol}')" class="p-4 hover:bg-white/5 cursor-pointer text-[10px] font-bold">${i.symbol} <span class="text-gray-600 font-normal">| ${i.name}</span></div>`).join('');
            box.style.display = 'block';
        }

        function selectTicker(s) { ticker = s; document.getElementById('tickerInput').value = s; document.getElementById('suggestions').style.display='none'; refreshData(); }
        function updateData(p, btn) { period = p; document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active-btn')); btn.classList.add('active-btn'); refreshData(); }

        async function refreshData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`/api/stream/${ticker}?period=${period}`);
                const d = await res.json();
                document.getElementById('symbolDisplay').innerText = d.symbol;
                document.getElementById('priceDisplay').innerText = d.price;
                document.getElementById('changeDisplay').innerText = d.change;
                document.getElementById('changeDisplay').style.color = d.chart_json.color;
                document.getElementById('targetDisplay').innerText = d.target;
                
                setTimeout(() => {
                    document.getElementById('healthBar').style.height = `${d.health}%`;
                    document.getElementById('hypeBar').style.height = `${d.hype}%`;
                }, 100);

                Plotly.newPlot('chartContainer', [{
                    x: d.chart_json.x, y: d.chart_json.y, type: 'scatter', mode: 'lines',
                    line: { color: d.chart_json.color, width: 2, shape: 'spline' }
                }], {
                    template: 'plotly_dark', paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { t: 0, b: 0, l: 0, r: 0 }, xaxis: { visible: false }, yaxis: { visible: false }
                }, { responsive: true, displayModeBar: false });

                document.getElementById('newsArea').innerHTML = d.news.map(n => `<a href="${n.link}" target="_blank" class="block text-[10px] text-gray-500 hover:text-white underline italic decoration-white/5">${n.title}</a>`).join('');
            } finally { setTimeout(() => document.getElementById('loader').classList.add('hidden'), 600); }
        }
        document.addEventListener('click', (e) => { if (!document.getElementById('searchContainer').contains(e.target)) document.getElementById('suggestions').style.display = 'none'; });
        window.onload = refreshData;
    </script>
</body>
</html>
