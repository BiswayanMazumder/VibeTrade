<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantedge | AI Pro Terminal</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <favicon href="https://g1uudlawy6t63z36.public.blob.vercel-storage.com/unnamed%20%281%29.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 150vh; overflow-x: hidden; padding-top: 130px; }
        
        header { 
            position: fixed; top: 0; left: 0; width: 100%; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 9999; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(25px);
            padding: 1.5rem 3rem; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-hidden { transform: translateY(-100%); }

        .glass-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .bar-container { height: 120px; display: flex; align-items: flex-end; gap: 1.5rem; padding: 0 10px; }
        .stat-bar { width: 100%; border-radius: 6px 6px 0 0; transition: height 1.5s ease-out; min-height: 4px; }
        .fill-health { background: linear-gradient(to top, #1e3a8a, #3b82f6); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .fill-hype { background: linear-gradient(to top, #7c2d12, #f97316); box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        
        #suggestions { position: fixed; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; display: none; z-index: 100000; box-shadow: 0 40px 80px rgba(0,0,0,1); }
        #loader.hidden { opacity: 0; visibility: hidden; }
        .active-btn { color: #60a5fa !important; border-bottom: 2px solid #60a5fa; }
        /* GEN-Z ANIMATIONS */
@keyframes glowPulse {
    0% { box-shadow: 0 0 0px rgba(16,185,129,0.4); }
    50% { box-shadow: 0 0 25px rgba(16,185,129,0.9); }
    100% { box-shadow: 0 0 0px rgba(16,185,129,0.4); }
}

@keyframes slideFade {
    0% { opacity: 0; transform: translateY(10px) scale(0.98); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes gradientFlow {
    0% { background-position: 0% }
    100% { background-position: 200% }
}

.success-text {
    background: linear-gradient(90deg, #00ffbb, #3b82f6, #00ffbb);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientFlow 2s linear infinite;
    font-weight: 800;
}

.animate-success {
    animation: slideFade 0.4s ease, glowPulse 1.2s ease;
}
    </style>
</head>
<body>

    <div id="authModal" class="fixed inset-0 z-[200000] bg-black/80 backdrop-blur-xl flex items-center justify-center hidden">
        <div class="glass-card p-8 rounded-2xl w-[350px]">
            <h2 id="authTitle" class="text-lg font-bold mb-4 text-center">LOGIN</h2>
            <input id="authEmail" placeholder="Email" class="w-full mb-3 p-3 bg-white/5 rounded-xl outline-none focus:ring-1 ring-emerald-500">
            <input id="authPassword" type="password" placeholder="Password" class="w-full mb-3 p-3 bg-white/5 rounded-xl outline-none focus:ring-1 ring-emerald-500">
            <input id="authUsername" placeholder="Username" class="w-full mb-3 p-3 bg-white/5 rounded-xl hidden outline-none focus:ring-1 ring-emerald-500">
            <p id="authError" class="text-red-400 text-xs mb-3 hidden text-center"></p>
            <button onclick="submitAuth()" 
class="w-full py-3 bg-emerald-500 hover:bg-emerald-400 text-black font-bold rounded-xl transition-all duration-300 active:scale-95 hover:scale-[1.02]">
Continue
</button>
            <p onclick="toggleAuthMode()" class="text-[10px] text-gray-400 mt-4 text-center cursor-pointer uppercase tracking-widest hover:text-white">Switch Mode</p>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 z-[100000] flex flex-col items-center justify-center bg-[#050505]/95 backdrop-blur-2xl transition-all duration-500 hidden">
        <div class="w-16 h-16 border-4 border-emerald-500/10 border-t-emerald-400 rounded-full animate-spin"></div>
        <p class="mt-6 text-[10px] font-black uppercase tracking-[0.4em] text-emerald-400">Syncing</p>
    </div>

    <header id="mainHeader" class="flex flex-col md:flex-row justify-between items-center gap-8">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">VANT<span class="text-emerald-400">EDGE.</span></h1>
        
        <div class="flex items-center gap-6 w-full md:w-auto">
            <div class="relative w-full md:w-96" id="searchContainer">
                <input id="tickerInput" autocomplete="off" oninput="handleSearch(this.value)" onfocus="handleSearch('')" placeholder="Search Asset..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-emerald-500 font-bold uppercase text-xs">
                <div id="suggestions"></div>
            </div>

            <div class="flex gap-3">
                <button onclick="openAuth()" id="loginBtn" class="text-[10px] font-bold uppercase tracking-widest bg-white/5 border border-white/10 px-6 py-3 rounded-xl hover:bg-white/10 transition-all">Login</button>
                <button onclick="logout()" id="logoutBtn" class="text-[10px] font-bold uppercase tracking-widest bg-red-500/10 border border-red-500/20 text-red-400 px-6 py-3 rounded-xl hover:bg-red-500/20 hidden transition-all">Sign Out</button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 relative">
            <div class="lg:col-span-8 glass-card rounded-[3rem] p-10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <p id="symbolDisplay" class="text-gray-500 font-bold text-[10px] uppercase mb-1">---</p>
                        <h2 id="priceDisplay" class="text-6xl font-extrabold tracking-tighter italic">0.00</h2>
                        <span id="changeDisplay" class="text-xl font-bold">0.00%</span>
                    </div>
                </div>

                <div class="flex gap-8 mb-8 border-b border-white/5 pb-2 text-[11px] font-bold text-gray-500">
                    <button onclick="updateData('1d', this)" class="time-btn active-btn">1D</button>
                    <button onclick="updateData('1mo', this)" class="time-btn">1M</button>
                    <button onclick="updateData('1y', this)" class="time-btn">1Y</button>
                    <button onclick="updateData('max', this)" class="time-btn">MAX</button>
                </div>

                <div id="chartContainer" style="width:100%; height:400px;"></div>

                <div class="grid grid-cols-3 gap-8 mt-12 pt-10 border-t border-white/5">
                    <div class="space-y-4">
                        <div class="flex justify-between text-[11px] uppercase"><span class="text-gray-500">Open</span><span id="f_open" class="font-bold">---</span></div>
                        <div class="flex justify-between text-[11px] uppercase"><span class="text-gray-500">Mkt cap</span><span id="f_mkt" class="font-bold">---</span></div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex justify-between text-[11px] uppercase"><span class="text-gray-500">P/E ratio</span><span id="f_pe" class="font-bold">---</span></div>
                        <div class="flex justify-between text-[11px] uppercase"><span class="text-gray-500">52w High</span><span id="f_h52" class="font-bold">---</span></div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex justify-between text-[11px] uppercase"><span class="text-gray-500">Dividend</span><span id="f_div" class="font-bold">---</span></div>
                        <div class="flex justify-between text-[11px] uppercase"><span class="text-gray-500">52w Low</span><span id="f_l52" class="font-bold">---</span></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="glass-card rounded-[2.5rem] p-8 border-l-4 border-blue-500">
                    <p class="text-[10px] font-bold uppercase text-blue-400 mb-1">12M AI Target</p>
                    <h3 id="targetDisplay" class="text-4xl font-black">---</h3>
                </div>
                <div class="glass-card rounded-[2.5rem] p-8">
                    <p class="text-[10px] font-bold uppercase text-orange-400 mb-6">⚡ Hype vs. Health</p>
                    <div class="bar-container">
                        <div class="flex-1 flex flex-col items-center"><div id="healthBar" class="stat-bar fill-health" style="height: 0%"></div><p class="text-[9px] mt-2 font-black text-blue-400">HEALTH</p></div>
                        <div class="flex-1 flex flex-col items-center"><div id="hypeBar" class="stat-bar fill-hype" style="height: 0%"></div><p class="text-[9px] mt-2 font-black text-orange-400">HYPE</p></div>
                    </div>
                </div>
                <div class="glass-card rounded-[2.5rem] p-8">
                    <p class="text-[10px] font-bold uppercase text-gray-500 mb-6">Headline Stream</p>
                    <div id="newsArea" class="space-y-5"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ticker = "AAPL", period = "1d", lastScroll = 0;
        let isLogin = true;

        // =========================
        // 🔐 AUTH SYSTEM LOGIC
        // =========================
        function openAuth() { document.getElementById("authModal").classList.remove("hidden"); }
        
        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById("authTitle").innerText = isLogin ? "LOGIN" : "REGISTER";
            document.getElementById("authUsername").classList.toggle("hidden", isLogin);
            document.getElementById("authError").classList.add("hidden");
        }

async function submitAuth() {
    const email = document.getElementById("authEmail").value;
    const password = document.getElementById("authPassword").value;
    const username = document.getElementById("authUsername").value;
    const error = document.getElementById("authError");

    error.classList.add("hidden");
    error.classList.remove("animate-success", "success-text");

    let url = isLogin
        ? `/auth/login?email=${email}&password=${password}`
        : `/auth/register?username=${username}&email=${email}&password=${password}`;

    try {
        let res = await fetch(url, { method: "POST" });
        let data = await res.json();

        if (!res.ok) {
            error.innerText = data.detail || "Authentication failed";
            error.classList.remove("hidden");
            error.classList.remove("success-text");
            error.classList.add("text-red-400", "animate-success");
            return;
        }

        if (isLogin) {
            localStorage.setItem("token", data.access_token);

            // 🔥 Smooth close animation
            const modal = document.getElementById("authModal");
            modal.style.opacity = "0";
            setTimeout(() => {
                modal.classList.add("hidden");
                modal.style.opacity = "1";
            }, 250);

            updateAuthUI();
        } else {
            // 💥 GEN-Z SUCCESS EFFECT
            error.innerHTML = "✔ Registration Successful";
            error.classList.remove("hidden", "text-red-400");
            error.classList.add("success-text", "animate-success");

            // ✨ Autofill email + smooth switch
            setTimeout(() => {
                toggleAuthMode();
                document.getElementById("authEmail").value = email;
                error.innerHTML = "Now login →";
                error.classList.add("success-text");
            }, 1200);
        }

    } catch (e) {
        error.innerText = "Network glitch ⚠️";
        error.classList.remove("hidden");
        error.classList.add("text-red-400", "animate-success");
    }
}

        function logout() {
            localStorage.removeItem("token");
            updateAuthUI();
        }

        function updateAuthUI() {
            const token = localStorage.getItem("token");
            document.getElementById("loginBtn").classList.toggle("hidden", !!token);
            document.getElementById("logoutBtn").classList.toggle("hidden", !token);
        }

        // =========================
        // CORE UI LOGIC
        // =========================
        window.addEventListener("scroll", () => {
            const currentScroll = window.pageYOffset;
            const header = document.getElementById("mainHeader");
            const suggestions = document.getElementById("suggestions");

            if (currentScroll > lastScroll && currentScroll > 60) {
                header.classList.add("header-hidden");
                suggestions.style.display = "none";
            } else {
                header.classList.remove("header-hidden");
            }
            lastScroll = currentScroll;
        });

        async function handleSearch(q) {
            const box = document.getElementById('suggestions');
            const rect = document.getElementById('tickerInput').getBoundingClientRect();
            box.style.top = `${rect.bottom + window.scrollY + 10}px`; 
            box.style.left = `${rect.left}px`; 
            box.style.width = `${rect.width}px`;

            if (q === '') {
                try {
                    const res = await fetch('/api/context'); 
                    const data = await res.json();
                    box.innerHTML = `<p class="p-4 text-[9px] font-black uppercase text-gray-600">Trending Now</p>` + 
                        data.trending.map(i => `<div onclick="selectTicker('${i.s}')" class="p-4 hover:bg-white/5 cursor-pointer text-xs flex justify-between"><span><b class="text-emerald-400">${i.s}</b> - ${i.n}</span></div>`).join('');
                    box.style.display = 'block'; 
                } catch(e) {}
                return;
            }
            const res = await fetch(`/api/search/${q}`); 
            const data = await res.json();
            box.innerHTML = data.map(i => `<div onclick="selectTicker('${i.symbol}')" class="p-4 hover:bg-white/5 cursor-pointer text-xs"><b class="text-emerald-400">${i.symbol}</b> - ${i.name}</div>`).join('');
            box.style.display = 'block';
        }

        document.addEventListener('click', (e) => { 
            if (!document.getElementById('searchContainer').contains(e.target)) 
                document.getElementById('suggestions').style.display = 'none'; 
        });

        function selectTicker(s) { 
            ticker = s; 
            document.getElementById('tickerInput').value = s; 
            document.getElementById('suggestions').style.display='none'; 
            refreshData(); 
        }

        function updateData(p, btn) { 
            period = p; 
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active-btn')); 
            btn.classList.add('active-btn'); 
            refreshData(); 
        }

        async function refreshData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`/api/stream/${ticker}?period=${period}`);
                const data = await res.json();
                
                document.getElementById('symbolDisplay').innerText = data.symbol;
                document.getElementById('priceDisplay').innerHTML = `${data.price} <span class="text-sm text-gray-500 font-normal ml-2">${data.currency_text}</span>`;
                document.getElementById('changeDisplay').innerText = data.change;
                document.getElementById('changeDisplay').style.color = parseFloat(data.change) >= 0 ? '#00ffbb' : '#ff3366';

                setTimeout(() => {
                    document.getElementById('healthBar').style.height = `${data.health}%`;
                    document.getElementById('hypeBar').style.height = `${data.hype}%`;
                }, 100);

                const c = data.chart_json;
                Plotly.newPlot('chartContainer', [{
                    x: c.x, y: c.y, type: 'scatter', mode: 'lines',
                    line: { color: c.color, width: 2.5, shape: 'hv' },
                    hovertemplate: `<b>%{y:,.2f} ${c.curr}</b><br>%{x|%d %b %Y}<extra></extra>`
                }], {
                    template: 'plotly_dark', paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { t: 40, b: 20, l: 0, r: 40 }, hovermode: 'x unified',
                    annotations: [{ xref: 'paper', yref: 'paper', x: 1, y: 1.1, text: c.status, showarrow: false, font: { color: c.color, size: 10 } }],
                    xaxis: { showgrid: false, spikemode: 'across', spikedash: 'dash', spikecolor: 'rgba(255,255,255,0.2)' },
                    yaxis: { side: 'right', showgrid: true, gridcolor: 'rgba(255,255,255,0.05)' }
                }, { responsive: true, displayModeBar: false });

                document.getElementById('targetDisplay').innerText = data.target;
                document.getElementById('newsArea').innerHTML = data.news.map(n => `<a href="${n.link}" target="_blank" class="block text-[11px] hover:text-emerald-400 underline decoration-white/5 italic">${n.title}</a>`).join('');

                const f = data.fundamentals;
                document.getElementById('f_open').innerText = f.open; document.getElementById('f_mkt').innerText = f.mkt_cap;
                document.getElementById('f_pe').innerText = f.pe; document.getElementById('f_h52').innerText = f.h52;
                document.getElementById('f_div').innerText = f.div; document.getElementById('f_l52').innerText = f.l52;
            } catch (e) { console.error(e); } finally { setTimeout(() => document.getElementById('loader').classList.add('hidden'), 800); }
        }

        window.onload = () => {
            updateAuthUI();
            refreshData();
        };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
