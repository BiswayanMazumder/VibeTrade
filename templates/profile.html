<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantedge | Core Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .neon-border {
            border-left: 4px solid #10b981;
        }

        #terminal-loader {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .scanner-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #10b981, transparent);
            position: absolute;
            top: 0;
            animation: scan 2s linear infinite;
            box-shadow: 0 0 15px #10b981;
            opacity: 0.5;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .loading-text {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.5em;
            color: #10b981;
            text-transform: uppercase;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        .hex-loader {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(16, 185, 129, 0.1);
            border-top: 2px solid #10b981;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .profile-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.3);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        /* HUD Slide Animation */
        .hud-active {
            transform: translate(-50%, -20px) !important;
            opacity: 1 !important;
        }
    </style>
</head>

<body>
    <div id="terminal-loader">
        <div class="scanner-line"></div>
        <div class="relative">
            <div class="hex-loader"></div>
            <div class="absolute inset-0 m-auto w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_15px_#10b981]"></div>
        </div>
        <p class="loading-text">Establishing Secure Uplink...</p>
        <div class="mt-4 w-48 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-emerald-500 w-0 transition-all duration-500 ease-out"></div>
        </div>
    </div>

    <div class="max-w-4xl w-full px-6 flex flex-col items-center">
        <div class="mb-12 text-center">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase mb-2">VANT<span class="text-emerald-400">EDGE.</span></h1>
            <div class="h-[1px] w-12 bg-emerald-500/50 mx-auto"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 w-full">
            <div class="md:col-span-5 glass-card rounded-[3rem] p-10 flex flex-col items-center text-center">
                <div class="w-28 h-28 rounded-full bg-gradient-to-br from-emerald-400 to-blue-500 p-[2px] mb-6">
                    <div class="w-full h-full rounded-full bg-[#050505] flex items-center justify-center text-3xl font-black italic tracking-tighter" id="userInitials">
                        --
                    </div>
                </div>

                <div class="flex flex-col items-center group mb-1">
                    <div id="nameContainer" class="flex items-center gap-3">
                        <h2 id="userName" class="text-3xl font-black italic tracking-tighter">---</h2>
                        <button onclick="toggleEditMode()" class="opacity-30 hover:opacity-100 transition-opacity">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                        </button>
                    </div>
                    <div id="editMode" class="hidden flex flex-col items-center gap-2">
                        <input type="text" id="nameInput" class="bg-transparent border-b-2 border-emerald-500/50 text-emerald-400 text-2xl font-black italic tracking-tighter text-center outline-none focus:border-emerald-400 transition-all w-64 uppercase" placeholder="NEW ALIAS...">
                        <div class="flex gap-4">
                            <button onclick="submitNewName()" class="text-[9px] font-black tracking-widest text-emerald-400 hover:text-white uppercase">Confirm</button>
                            <button onclick="toggleEditMode()" class="text-[9px] font-black tracking-widest text-red-500/70 hover:text-red-400 uppercase">Abort</button>
                        </div>
                    </div>
                </div>

                <div id="userTier" class="status-badge px-4 py-1 rounded-full text-[9px] font-black tracking-widest uppercase mb-8">
                    VERIFIED TERMINAL PRO
                </div>

                <div class="w-full space-y-4 pt-6 border-t border-white/5">
                    <div class="flex justify-between items-center">
                        <span class="profile-label">Terminal ID</span>
                        <span id="userId" class="font-mono text-[11px] text-emerald-400/80">VT-0000</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="profile-label">Uplink Status</span>
                        <span class="text-[10px] font-bold text-blue-400 flex items-center gap-2">
                            <div class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-pulse" id="status"></div> ACTIVE
                        </span>
                    </div>
                </div>
            </div>

            <div class="md:col-span-7 space-y-6">
                <div class="glass-card rounded-[2.5rem] p-8 neon-border">
                    <p class="profile-label mb-2">Authentication Email</p>
                    <h3 id="userEmail" class="text-xl font-bold tracking-tight">---</h3>
                </div>

                <div class="glass-card rounded-[2.5rem] p-8">
                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <p class="profile-label mb-1">Member Since</p>
                            <p id="userJoined" class="text-sm font-bold">---</p>
                        </div>
                        <div>
                            <p class="profile-label mb-1">Active Sessions</p>
                            <p class="text-sm font-bold">01 - Terminal Main</p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="window.location.href='/'" class="flex-1 glass-card hover:bg-white/5 rounded-2xl py-4 text-[10px] font-black uppercase tracking-widest transition-all">
                        Return to Terminal
                    </button>
                    <button onclick="logout()" class="flex-1 bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 rounded-2xl py-4 text-[10px] font-black uppercase tracking-widest transition-all">
                        Terminate Session
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="hud-notification" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 pointer-events-none transition-all duration-500 z-[100000]">
        <div id="hud-card" class="glass-card px-8 py-3 rounded-full border border-emerald-500/30 flex items-center gap-4">
            <div id="hud-dot" class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <span id="hud-msg" class="text-[10px] font-black tracking-[0.3em] uppercase text-emerald-400">System Ready</span>
        </div>
    </div>

    <script>
        async function fetchProfile() {
            const loader = document.getElementById("terminal-loader");
            const progressBar = document.getElementById("progress-bar");
            const token = localStorage.getItem("token");

            if (!token) { window.location.href = "/"; return; }

            setTimeout(() => progressBar.style.width = "40%", 100);

            try {
                const res = await fetch("/api/profile", {
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                progressBar.style.width = "80%";
                const data = await res.json();

                if (res.ok) {
                    const name = data.username || "UNKNOWN USER";
                    document.getElementById("userName").innerText = name.toUpperCase();
                    document.getElementById("userInitials").innerText = name.substring(0, 2).toUpperCase();
                    document.getElementById("userEmail").innerText = data.email || "No Email Linked";
                    document.getElementById("userJoined").innerText = data.member_since || "Recent";

                    const rawId = data.uid || 0;
                    const formattedId = String(rawId).padStart(4, '0');
                    document.getElementById("userId").innerText = `VT-${formattedId}`;

                    progressBar.style.width = "100%";
                    setTimeout(() => {
                        loader.style.opacity = "0";
                        setTimeout(() => loader.style.display = "none", 800);
                    }, 500);

                } else {
                    logout();
                }
            } catch (err) {
                console.error("Uplink failed:", err);
                document.getElementById("userName").innerText = "OFFLINE";
                loader.style.display = "none";
            }
        }

        function toggleEditMode() {
            const container = document.getElementById("nameContainer");
            const editMode = document.getElementById("editMode");
            const input = document.getElementById("nameInput");

            if (editMode.classList.contains("hidden")) {
                container.classList.add("hidden");
                editMode.classList.remove("hidden");
                input.value = document.getElementById("userName").innerText;
                input.focus();
            } else {
                container.classList.remove("hidden");
                editMode.classList.add("hidden");
            }
        }

        async function submitNewName() {
            const newName = document.getElementById("nameInput").value.trim();
            const token = localStorage.getItem("token");

            if (!newName || newName.length < 3) return showHUD("INVALID PARAMETERS", "error");

            try {
                const res = await fetch("/api/profile/update-username", {
                    method: "PUT",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username: newName })
                });

                if (res.ok) {
                    document.getElementById("userName").innerText = newName.toUpperCase();
                    document.getElementById("userInitials").innerText = newName.substring(0, 2).toUpperCase();
                    toggleEditMode();
                    showHUD("IDENTITY RE-VERIFIED");
                } else {
                    showHUD("ACCESS DENIED", "error");
                }
            } catch (err) {
                showHUD("UPLINK FAILURE", "error");
            }
        }

        function showHUD(msg, type = "success") {
            const hud = document.getElementById("hud-notification");
            const hudMsg = document.getElementById("hud-msg");
            const hudCard = document.getElementById("hud-card");
            const hudDot = document.getElementById("hud-dot");
            
            hudMsg.innerText = msg;
            
            if (type === "success") {
                hudMsg.className = "text-[10px] font-black tracking-[0.3em] uppercase text-emerald-400";
                hudCard.style.borderColor = "rgba(16, 185, 129, 0.3)";
                hudDot.className = "w-2 h-2 bg-emerald-500 rounded-full animate-pulse";
            } else {
                hudMsg.className = "text-[10px] font-black tracking-[0.3em] uppercase text-red-500";
                hudCard.style.borderColor = "rgba(239, 68, 68, 0.3)";
                hudDot.className = "w-2 h-2 bg-red-500 rounded-full animate-pulse";
            }

            hud.classList.add("hud-active");

            setTimeout(() => {
                hud.classList.remove("hud-active");
            }, 3000);
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/";
        }

        window.onload = fetchProfile;
    </script>
</body>

</html>
