<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantedge | Core Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Matches the dashboard glass cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .neon-border {
            border-left: 4px solid #10b981;
        }

        .animate-glow {
            background: linear-gradient(90deg, #00ffbb, #3b82f6, #00ffbb);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowMove 3s linear infinite;
        }
        /* High-Tech Loader Styles */
        #terminal-loader {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .scanner-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #10b981, transparent);
            position: absolute;
            top: 0;
            animation: scan 2s linear infinite;
            box-shadow: 0 0 15px #10b981;
            opacity: 0.5;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .loading-text {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.5em;
            color: #10b981;
            text-transform: uppercase;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        .hex-loader {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(16, 185, 129, 0.1);
            border-top: 2px solid #10b981;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes glowMove {
            0% {
                background-position: 0%
            }

            100% {
                background-position: 200%
            }
        }

        .profile-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.3);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
    </style>
</head>

<body>
    <div id="terminal-loader">
        <div class="scanner-line"></div>
        <div class="relative">
            <div class="hex-loader"></div>
            <div class="absolute inset-0 m-auto w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_15px_#10b981]"></div>
        </div>
        <p class="loading-text">Establishing Secure Uplink...</p>
        <div class="mt-4 w-48 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-emerald-500 w-0 transition-all duration-500 ease-out"></div>
        </div>
    </div>
    <div class="max-w-4xl w-full px-6 flex flex-col items-center">
        <div class="mb-12 text-center">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase mb-2">VANT<span
                    class="text-emerald-400">EDGE.</span></h1>
            <div class="h-[1px] w-12 bg-emerald-500/50 mx-auto"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 w-full">

            <div class="md:col-span-5 glass-card rounded-[3rem] p-10 flex flex-col items-center text-center">
                <div class="w-28 h-28 rounded-full bg-gradient-to-br from-emerald-400 to-blue-500 p-[2px] mb-6">
                    <div class="w-full h-full rounded-full bg-[#050505] flex items-center justify-center text-3xl font-black italic tracking-tighter"
                        id="userInitials">
                        --
                    </div>
                </div>
                <h2 id="userName" class="text-3xl font-black italic tracking-tighter mb-1">---</h2>
                <div id="userTier"
                    class="status-badge px-4 py-1 rounded-full text-[9px] font-black tracking-widest uppercase mb-8">
                    VERIFIED TERMINAL PRO
                </div>

                <div class="w-full space-y-4 pt-6 border-t border-white/5">
                    <div class="flex justify-between items-center">
                        <span class="profile-label">Terminal ID</span>
                        <span id="userId" class="font-mono text-[11px] text-emerald-400/80">VT-0000</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="profile-label">Uplink Status</span>
                        <span class="text-[10px] font-bold text-blue-400 flex items-center gap-2">
                            <div class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-pulse" id="status"></div> ACTIVE
                        </span>
                    </div>
                </div>
            </div>

            <div class="md:col-span-7 space-y-6">
                <div class="glass-card rounded-[2.5rem] p-8 neon-border">
                    <p class="profile-label mb-2">Authentication Email</p>
                    <h3 id="userEmail" class="text-xl font-bold tracking-tight">---</h3>
                </div>

                <div class="glass-card rounded-[2.5rem] p-8">
                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <p class="profile-label mb-1">Member Since</p>
                            <p id="userJoined" class="text-sm font-bold">---</p>
                        </div>
                        <div>
                            <p class="profile-label mb-1">Active Sessions</p>
                            <p class="text-sm font-bold">01 - Terminal Main</p>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="window.location.href='/'"
                        class="flex-1 glass-card hover:bg-white/5 rounded-2xl py-4 text-[10px] font-black uppercase tracking-widest transition-all">
                        Return to Terminal
                    </button>
                    <button onclick="logout()"
                        class="flex-1 bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 rounded-2xl py-4 text-[10px] font-black uppercase tracking-widest transition-all">
                        Terminate Session
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
// <script>
        async function fetchProfile() {
            const loader = document.getElementById("terminal-loader");
            const progressBar = document.getElementById("progress-bar");
            const token = localStorage.getItem("token");

            if (!token) { window.location.href = "/"; return; }

            // Start Progress Animation
            setTimeout(() => progressBar.style.width = "40%", 100);

            try {
                const res = await fetch("/api/profile", {
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                progressBar.style.width = "80%";
                const data = await res.json();

                if (res.ok) {
                    // Populate data
                    const name = data.username || "UNKNOWN USER";
                    document.getElementById("userName").innerText = name.toUpperCase();
                    document.getElementById("userInitials").innerText = name.substring(0, 2).toUpperCase();
                    document.getElementById("userEmail").innerText = data.email || "No Email Linked";
                    document.getElementById("userJoined").innerText = data.member_since || "Recent";

                    const rawId = data.uid || 0;
                    const formattedId = String(rawId).padStart(4, '0');
                    document.getElementById("userId").innerText = `VT-${formattedId}`;

                    // Data Loaded Successfully
                    progressBar.style.width = "100%";
                    
                    // Delay hiding loader slightly for "pro" feel
                    setTimeout(() => {
                        loader.style.opacity = "0";
                        setTimeout(() => loader.style.display = "none", 800);
                    }, 500);

                } else {
                    logout();
                }
            } catch (err) {
                console.error("Uplink failed:", err);
                document.getElementById("userName").innerText = "OFFLINE";
                // Hide loader anyway so user can see error state
                loader.style.display = "none";
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/";
        }


        window.onload = fetchProfile;


        function logout() {
            localStorage.removeItem("token");
            window.location.reload();
        }

        window.onload = fetchProfile;
    </script>
</body>

</html>
